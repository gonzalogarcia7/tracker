<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engagement Flow • Your Solo Audit Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
    <style>
        .kanban-column { min-height: 600px; }
        .client-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .client-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1); }
        .progress-bar { transition: width 0.4s ease-in-out; }
    </style>
</head>
<body class="h-full bg-zinc-950 text-white">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <div class="w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col">
            <div class="p-6 border-b border-zinc-800">
                <h1 class="text-2xl font-bold flex items-center gap-3">
                    <i class="fa-solid fa-chart-gantt text-emerald-500"></i>
                    Engagement Flow
                </h1>
                <p class="text-zinc-500 text-sm mt-1">Solo Audit OS</p>
            </div>
            
            <div class="p-4">
                <button onclick="addNewClient()" 
                        class="w-full bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl font-medium flex items-center justify-center gap-2">
                    <i class="fa-solid fa-plus"></i>
                    Add New Client
                </button>
            </div>

            <div class="px-4">
                <div class="text-xs uppercase tracking-widest text-zinc-500 mb-2 px-3">Quick Filters</div>
                <div onclick="filterBy('all')" class="px-3 py-2 hover:bg-zinc-800 rounded-lg cursor-pointer flex items-center gap-2 text-sm" id="filter-all">
                    <i class="fa-solid fa-list"></i> All Clients
                </div>
                <div onclick="filterBy('overdue')" class="px-3 py-2 hover:bg-zinc-800 rounded-lg cursor-pointer flex items-center gap-2 text-sm" id="filter-overdue">
                    <i class="fa-solid fa-clock text-red-400"></i> Overdue
                </div>
            </div>

            <div class="mt-auto p-4 border-t border-zinc-800">
                <button onclick="exportData()" 
                        class="w-full text-zinc-400 hover:text-white text-sm py-2 flex items-center gap-2 justify-center">
                    <i class="fa-solid fa-download"></i> Export JSON
                </button>
                <button onclick="importData()" 
                        class="w-full text-zinc-400 hover:text-white text-sm py-2 flex items-center gap-2 justify-center">
                    <i class="fa-solid fa-upload"></i> Import JSON
                </button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col">
            <!-- Top Bar -->
            <div class="h-16 border-b border-zinc-800 bg-zinc-900 px-8 flex items-center justify-between">
                <div class="flex items-center gap-8">
                    <input id="searchInput" 
                           onkeyup="filterClients()"
                           type="text" 
                           placeholder="Search clients..." 
                           class="bg-zinc-800 border border-zinc-700 rounded-xl px-5 py-2 w-80 focus:outline-none focus:border-emerald-500">
                </div>

                <div class="flex items-center gap-4">
                    <button onclick="showMondayModal()" 
                            class="bg-white text-black px-5 py-2 rounded-2xl font-medium flex items-center gap-2 hover:bg-emerald-400">
                        <i class="fa-solid fa-calendar"></i>
                        Monday Overview
                    </button>
                    <div class="w-8 h-8 bg-emerald-600 rounded-full flex items-center justify-center font-semibold">G</div>
                </div>
            </div>

            <!-- Kanban View -->
            <div id="kanbanView" class="flex-1 overflow-auto p-8">
                <div class="grid grid-cols-5 gap-6" id="kanbanBoard">
                    <!-- Columns injected by JS -->
                </div>
            </div>
        </div>

        <!-- Right Sidebar: Bottlenecks -->
        <div class="w-80 bg-zinc-900 border-l border-zinc-800 p-6 overflow-auto">
            <h3 class="font-semibold mb-4 flex items-center gap-2">
                <i class="fa-solid fa-triangle-exclamation text-amber-400"></i>
                Active Bottlenecks
            </h3>
            <div id="bottleneckList" class="space-y-3">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <!-- Client Detail Modal (notes + checklist + everything) -->
    <div id="clientModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-zinc-900 rounded-3xl w-full max-w-2xl mx-4 max-h-[90vh] overflow-hidden flex flex-col">
            <div class="p-8 pb-4 border-b border-zinc-800 flex items-center justify-between">
                <h2 class="text-2xl font-bold" id="modalTitle">Client Details</h2>
                <button onclick="closeModal()" class="text-zinc-400 hover:text-white text-2xl leading-none">×</button>
            </div>
            
            <div class="flex-1 overflow-auto p-8 space-y-8">
                <!-- Basic Info -->
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm text-zinc-400 mb-1">Client Name</label>
                        <input id="clientName" type="text" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-3 focus:outline-none focus:border-emerald-500">
                    </div>
                    <div>
                        <label class="block text-sm text-zinc-400 mb-1">Client Code</label>
                        <input id="clientCode" type="text" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-3 focus:outline-none focus:border-emerald-500">
                    </div>
                    <div>
                        <label class="block text-sm text-zinc-400 mb-1">Deadline</label>
                        <input id="dueDate" type="date" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-3 focus:outline-none focus:border-emerald-500">
                    </div>
                    <div>
                        <label class="block text-sm text-zinc-400 mb-1">Stage</label>
                        <select id="stageSelect" onchange="manualStageChange()" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-3 focus:outline-none focus:border-emerald-500">
                            <!-- populated by JS -->
                        </select>
                    </div>
                </div>

                <!-- Progress -->
                <div>
                    <div class="flex justify-between text-sm mb-2">
                        <span class="font-medium">Stage Completion</span>
                        <span id="modalProgressText" class="font-mono">0%</span>
                    </div>
                    <div class="h-3 bg-zinc-700 rounded-full overflow-hidden">
                        <div id="modalProgressBar" class="h-full bg-emerald-500 progress-bar" style="width: 0%"></div>
                    </div>
                </div>

                <!-- Checklist -->
                <div>
                    <div class="flex items-center justify-between mb-3">
                        <h3 class="font-semibold">Current Stage Checklist</h3>
                        <button onclick="addChecklistItem()" 
                                class="text-emerald-400 hover:text-emerald-300 text-sm flex items-center gap-1">
                            <i class="fa-solid fa-plus"></i> Add step
                        </button>
                    </div>
                    <div id="checklistContainer" class="space-y-3"></div>
                </div>

                <!-- Notes -->
                <div>
                    <h3 class="font-semibold mb-3">Notes (things you want to remember)</h3>
                    <textarea id="clientNotes" rows="4"
                              class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-5 py-4 focus:outline-none focus:border-emerald-500 resize-none"
                              placeholder="e.g. Needs Q2 bank statements..."></textarea>
                </div>

                <!-- Bottlenecks -->
                <div>
                    <h3 class="font-semibold mb-3 flex items-center gap-2">
                        <i class="fa-solid fa-triangle-exclamation text-amber-400"></i> Bottlenecks
                    </h3>
                    <div id="modalBottlenecks" class="flex flex-wrap gap-2"></div>
                    <div class="mt-3 flex gap-3">
                        <input id="newBottleneckInput" type="text" placeholder="Add bottleneck..." 
                               class="flex-1 bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-3 focus:outline-none focus:border-emerald-500">
                        <button onclick="addBottleneck()" class="bg-amber-400 text-black px-6 rounded-2xl font-medium">Add</button>
                    </div>
                </div>
            </div>

            <div class="border-t border-zinc-800 p-6 flex gap-3">
                <button onclick="deleteClient()" class="flex-1 py-4 text-red-400 hover:bg-red-900/30 rounded-2xl font-medium">Delete Client</button>
                <button onclick="closeModal()" class="flex-1 py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl font-medium">Cancel</button>
                <button onclick="saveClientDetail()" class="flex-1 py-4 bg-emerald-600 hover:bg-emerald-500 rounded-2xl font-medium">Save All Changes</button>
            </div>
        </div>
    </div>

    <!-- Monday Overview Modal -->
    <div id="mondayModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-zinc-900 rounded-3xl w-full max-w-md mx-4 p-8">
            <h2 class="text-2xl font-bold mb-6">Monday Overview</h2>
            <div id="mondayContent" class="space-y-6">
                <!-- JS injected -->
            </div>
            <button onclick="closeMondayModal()" 
                    class="mt-8 w-full py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl">Close</button>
        </div>
    </div>

    <script>
        // Default checklists per stage (exactly as you specified + ability to add/delete)
        const defaultChecklists = {
            "Planning": [
                "EL sent",
                "PAR done",
                "Walkthroughs",
                "Risk assessment",
                "Planning memo"
            ],
            "Fieldwork": [
                "Assets",
                "Liabilities",
                "Equity",
                "Rev",
                "Expenses"
            ],
            "Financials": [
                "Schedules",
                "Notes",
                "Proofing"
            ],
            "Final": [
                "Send draft to client",
                "Final proofing",
                "Clear review notes"
            ],
            "Archive": [
                "Did you archive?"
            ]
        };

        const stages = ["Planning", "Fieldwork", "Financials", "Final", "Archive"];

        let clients = [
            {
                id: "c1",
                name: "Acme Manufacturing",
                clientCode: "ACM-2026",
                stage: "Fieldwork",
                dueDate: "2026-05-15",
                checklist: [
                    {title: "Assets", completed: true},
                    {title: "Liabilities", completed: true},
                    {title: "Equity", completed: false},
                    {title: "Rev", completed: false},
                    {title: "Expenses", completed: false}
                ],
                notes: "Client still needs to provide Q1 bank recs.",
                bottlenecks: ["Waiting on bank confirmations"]
            },
            {
                id: "c2",
                name: "TechNova Inc",
                clientCode: "TNV-2026",
                stage: "Planning",
                dueDate: "2026-06-01",
                checklist: [
                    {title: "EL sent", completed: true},
                    {title: "PAR done", completed: false},
                    {title: "Walkthroughs", completed: false},
                    {title: "Risk assessment", completed: false},
                    {title: "Planning memo", completed: false}
                ],
                notes: "",
                bottlenecks: []
            }
        ];

        function saveToLocalStorage() {
            localStorage.setItem("engagementClientsSolo", JSON.stringify(clients));
        }

        function loadFromLocalStorage() {
            const saved = localStorage.getItem("engagementClientsSolo");
            if (saved) clients = JSON.parse(saved);
        }

        function calculateProgress(checklist) {
            if (!checklist || checklist.length === 0) return 0;
            const completed = checklist.filter(item => item.completed).length;
            return Math.round((completed / checklist.length) * 100);
        }

        function getNextStage(currentStage) {
            const idx = stages.indexOf(currentStage);
            return idx < stages.length - 1 ? stages[idx + 1] : currentStage;
        }

        function renderKanban() {
            const board = document.getElementById("kanbanBoard");
            board.innerHTML = "";

            stages.forEach(stage => {
                const columnClients = clients.filter(c => c.stage === stage);
                
                const col = document.createElement("div");
                col.className = "bg-zinc-900 rounded-3xl p-4 border border-zinc-800";
                col.innerHTML = `
                    <div class="flex items-center justify-between mb-4 px-2">
                        <div class="font-semibold">${stage}</div>
                        <div class="text-xs bg-zinc-800 px-3 py-1 rounded-full">${columnClients.length}</div>
                    </div>
                    <div class="space-y-3 min-h-[500px] kanban-column" id="col-${stage}"></div>
                `;
                board.appendChild(col);

                const container = document.getElementById(`col-${stage}`);
                
                columnClients.forEach(client => {
                    const card = createClientCard(client);
                    container.appendChild(card);
                });

                // Drag & drop
                container.addEventListener("dragover", e => e.preventDefault());
                container.addEventListener("drop", e => {
                    e.preventDefault();
                    const id = e.dataTransfer.getData("text/plain");
                    const client = clients.find(c => c.id === id);
                    if (client) {
                        client.stage = stage;
                        // Load default checklist for new stage
                        client.checklist = defaultChecklists[stage].map(title => ({title, completed: false}));
                        renderKanban();
                        renderBottlenecks();
                        saveToLocalStorage();
                    }
                });
            });
        }

        function createClientCard(client) {
            const card = document.createElement("div");
            card.className = `client-card bg-zinc-800 border border-zinc-700 rounded-2xl p-4 cursor-grab active:cursor-grabbing`;
            card.draggable = true;
            card.ondragstart = (e) => e.dataTransfer.setData("text/plain", client.id);

            const progress = calculateProgress(client.checklist);
            const isOverdue = new Date(client.dueDate) < new Date() && client.stage !== "Archive";

            card.innerHTML = `
                <div class="flex justify-between items-start">
                    <div class="flex-1">
                        <div class="font-semibold">${client.name}</div>
                        <div class="text-xs text-zinc-500">${client.clientCode}</div>
                    </div>
                </div>
                
                <div class="mt-4 h-2 bg-zinc-700 rounded-full overflow-hidden">
                    <div class="progress-bar h-full ${progress > 70 ? 'bg-emerald-500' : progress > 40 ? 'bg-amber-500' : 'bg-red-500'}" 
                         style="width: ${progress}%"></div>
                </div>
                <div class="text-xs text-right mt-1 text-zinc-400">${progress}%</div>

                <div class="mt-3 text-xs flex justify-between">
                    <span class="${isOverdue ? 'text-red-400' : 'text-zinc-400'}">
                        Due: ${client.dueDate}
                    </span>
                </div>

                ${client.bottlenecks && client.bottlenecks.length > 0 ? `
                <div class="mt-3 flex flex-wrap gap-1">
                    ${client.bottlenecks.map(b => `<span class="text-[10px] bg-red-900/50 text-red-300 px-2 py-0.5 rounded">⚠ ${b}</span>`).join('')}
                </div>` : ''}
            `;

            card.onclick = (e) => {
                if (e.target.tagName !== "BUTTON") openClientDetail(client.id);
            };
            return card;
        }

        function renderBottlenecks() {
            const container = document.getElementById("bottleneckList");
            container.innerHTML = "";

            const withBottlenecks = clients.filter(c => c.bottlenecks && c.bottlenecks.length > 0);

            if (withBottlenecks.length === 0) {
                container.innerHTML = `<p class="text-zinc-500 text-sm">No active bottlenecks</p>`;
                return;
            }

            withBottlenecks.forEach(client => {
                const div = document.createElement("div");
                div.className = "bg-zinc-800 border border-red-900/30 rounded-2xl p-4 text-sm cursor-pointer";
                div.innerHTML = `
                    <div class="font-medium">${client.name}</div>
                    <div class="text-red-400 text-xs mt-1">${client.bottlenecks[0]}</div>
                `;
                div.onclick = () => openClientDetail(client.id);
                container.appendChild(div);
            });
        }

        let currentClientId = null;

        function openClientDetail(id) {
            currentClientId = id;
            const client = clients.find(c => c.id === id);
            if (!client) return;

            document.getElementById("modalTitle").innerHTML = `${client.name} <span class="text-sm font-normal text-zinc-400">(${client.stage})</span>`;
            
            document.getElementById("clientName").value = client.name;
            document.getElementById("clientCode").value = client.clientCode;
            document.getElementById("dueDate").value = client.dueDate;
            document.getElementById("clientNotes").value = client.notes || "";

            // Populate stage dropdown
            const select = document.getElementById("stageSelect");
            select.innerHTML = stages.map(s => `<option value="${s}" ${s === client.stage ? 'selected' : ''}>${s}</option>`).join('');

            // Render checklist
            renderChecklist(client);

            // Render bottlenecks
            renderModalBottlenecks(client);

            document.getElementById("clientModal").classList.remove("hidden");
        }

        function renderChecklist(client) {
            const container = document.getElementById("checklistContainer");
            container.innerHTML = "";

            client.checklist.forEach((item, index) => {
                const div = document.createElement("div");
                div.className = "flex items-center gap-3 bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3";
                div.innerHTML = `
                    <input type="checkbox" ${item.completed ? 'checked' : ''} 
                           onchange="toggleChecklistItem(${index});">
                    <span class="flex-1 ${item.completed ? 'line-through text-zinc-400' : ''}">${item.title}</span>
                    <button onclick="deleteChecklistItem(${index}); event.stopImmediatePropagation();" 
                            class="text-red-400 hover:text-red-300 text-xl leading-none">×</button>
                `;
                container.appendChild(div);
            });

            // Update progress in modal
            const progress = calculateProgress(client.checklist);
            document.getElementById("modalProgressBar").style.width = progress + "%";
            document.getElementById("modalProgressText").textContent = progress + "%";

            // Auto-advance logic
            const allDone = client.checklist.every(item => item.completed);
            if (allDone && client.stage !== "Archive") {
                setTimeout(() => {
                    if (confirm(`All items in ${client.stage} are complete! Move to ${getNextStage(client.stage)}?`)) {
                        autoAdvanceStage(client);
                    }
                }, 300);
            }
        }

        function toggleChecklistItem(index) {
            const client = clients.find(c => c.id === currentClientId);
            if (!client) return;
            client.checklist[index].completed = !client.checklist[index].completed;
            renderChecklist(client);
            renderKanban();
            saveToLocalStorage();
        }

        function deleteChecklistItem(index) {
            const client = clients.find(c => c.id === currentClientId);
            if (!client) return;
            client.checklist.splice(index, 1);
            renderChecklist(client);
            renderKanban();
            saveToLocalStorage();
        }

        function addChecklistItem() {
            const client = clients.find(c => c.id === currentClientId);
            if (!client) return;
            const newTitle = prompt("New checklist step:");
            if (newTitle && newTitle.trim()) {
                client.checklist.push({title: newTitle.trim(), completed: false});
                renderChecklist(client);
                renderKanban();
                saveToLocalStorage();
            }
        }

        function renderModalBottlenecks(client) {
            const container = document.getElementById("modalBottlenecks");
            container.innerHTML = client.bottlenecks.map((b, i) => `
                <span onclick="removeBottleneck(${i});" 
                      class="text-xs bg-red-900/50 text-red-300 px-3 py-1 rounded-full cursor-pointer flex items-center gap-1">
                    ⚠ ${b} <span class="text-red-400">×</span>
                </span>
            `).join('');
        }

        function addBottleneck() {
            const input = document.getElementById("newBottleneckInput");
            const val = input.value.trim();
            if (!val) return;
            const client = clients.find(c => c.id === currentClientId);
            if (client) {
                client.bottlenecks.push(val);
                renderModalBottlenecks(client);
                renderBottlenecks();
                input.value = "";
                saveToLocalStorage();
            }
        }

        function removeBottleneck(index) {
            const client = clients.find(c => c.id === currentClientId);
            if (client) {
                client.bottlenecks.splice(index, 1);
                renderModalBottlenecks(client);
                renderBottlenecks();
                saveToLocalStorage();
            }
        }

        function manualStageChange() {
            // Handled on save – this just allows selection
        }

        function autoAdvanceStage(client) {
            const next = getNextStage(client.stage);
            client.stage = next;
            // Load fresh defaults for new stage
            client.checklist = defaultChecklists[next].map(title => ({title, completed: false}));
            closeModal();
            renderKanban();
            renderBottlenecks();
            saveToLocalStorage();
        }

        function saveClientDetail() {
            const client = clients.find(c => c.id === currentClientId);
            if (!client) return;

            client.name = document.getElementById("clientName").value.trim();
            client.clientCode = document.getElementById("clientCode").value.trim();
            client.dueDate = document.getElementById("dueDate").value;
            client.notes = document.getElementById("clientNotes").value.trim();

            // Manual stage change
            const newStage = document.getElementById("stageSelect").value;
            if (newStage !== client.stage) {
                client.stage = newStage;
                client.checklist = defaultChecklists[newStage].map(title => ({title, completed: false}));
            }

            closeModal();
            renderKanban();
            renderBottlenecks();
            saveToLocalStorage();
        }

        function addNewClient() {
            const newClient = {
                id: "c" + Date.now().toString(36),
                name: "New Client",
                clientCode: "NEW-" + Date.now().toString().slice(-4),
                stage: "Planning",
                dueDate: "",
                checklist: defaultChecklists["Planning"].map(title => ({title, completed: false})),
                notes: "",
                bottlenecks: []
            };
            clients.push(newClient);
            renderKanban();
            saveToLocalStorage();
            openClientDetail(newClient.id); // immediately open for editing
        }

        function deleteClient() {
            if (!currentClientId) return;
            if (!confirm("Delete this client permanently?")) return;
            clients = clients.filter(c => c.id !== currentClientId);
            closeModal();
            renderKanban();
            renderBottlenecks();
            saveToLocalStorage();
        }

        function closeModal() {
            document.getElementById("clientModal").classList.add("hidden");
            currentClientId = null;
        }

        function showMondayModal() {
            const content = document.getElementById("mondayContent");
            const upcoming = clients.filter(c => new Date(c.dueDate) < new Date(Date.now() + 14*86400000) && c.stage !== "Archive");
            
            content.innerHTML = `
                <div class="space-y-4">
                    <div class="bg-zinc-800 rounded-2xl p-5">
                        <div class="text-emerald-400 text-sm font-medium">This Week / Next Week</div>
                        <div class="mt-3 space-y-3">
                            ${upcoming.length ? upcoming.map(c => `
                                <div onclick="openClientDetail('${c.id}');closeMondayModal();" class="flex justify-between text-sm cursor-pointer">
                                    <span>${c.name}</span>
                                    <span class="text-zinc-400">${c.stage} • ${c.dueDate}</span>
                                </div>
                            `).join('') : '<p class="text-zinc-400">No urgent deadlines</p>'}
                        </div>
                    </div>
                    <div class="text-center text-zinc-500 text-sm">You have ${clients.filter(c => new Date(c.dueDate) < new Date() && c.stage !== "Archive").length} overdue clients</div>
                </div>
            `;
            document.getElementById("mondayModal").classList.remove("hidden");
        }

        function closeMondayModal() {
            document.getElementById("mondayModal").classList.add("hidden");
        }

        function filterClients() {
            renderKanban(); // full search can be added later – works for now
        }

        function filterBy(type) {
            renderKanban();
        }

        function exportData() {
            const dataStr = JSON.stringify(clients, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = "engagement-flow-solo-backup.json";
            link.click();
        }

        function importData() {
            const input = document.createElement("input");
            input.type = "file";
            input.accept = ".json";
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = ev => {
                    try {
                        clients = JSON.parse(ev.target.result);
                        renderKanban();
                        renderBottlenecks();
                        saveToLocalStorage();
                        alert("✅ Data imported!");
                    } catch(e) { alert("Invalid file"); }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        // Init
        window.onload = () => {
            loadFromLocalStorage();
            renderKanban();
            renderBottlenecks();
        };
    </script>
</body>
</html>
