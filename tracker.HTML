</head>
<body>
    <div class="container">
     <div class="header">
    <div class="header-left">
        <h1>Project Tracker</h1>
        <p style="color: #64748b; font-size: 0.938rem; margin-top: 0.5rem;">
            
            <span id="rowCountIndicator" style="margin-left: 1rem; padding: 0.25rem 0.75rem; background: #e0f2fe; color: #0369a1; border-radius: 12px; font-weight: 600; font-size: 0.813rem;"></span>
        </p>
    </div>
    <div class="header-right">
        <input id="projectSearchInput" class="project-search" type="text" placeholder="Search projects and client IDs..." onfocus="this.select();" oninput="queueProjectSearch(this.value)" onkeydown="event.stopPropagation(); if(event.key==='Enter'){event.preventDefault();flushProjectSearch();}">
        <button class="btn btn-success" onclick="addProject()">+ Add Project</button>
        <button class="btn btn-secondary" onclick="showStats()">&#128202; Stats</button>
        <button class="btn btn-secondary" onclick="openMasterTeamList()">&#128101; Team List</button>
        <span class="metadata-toggle" onclick="toggleDetailsPanel()" title="Toggle right details panel">
            <span id="detailsPanelToggleText">+ Show Details Panel</span>
        </span>
    </div>
</div>
        <div class="tracker-layout" id="trackerLayout">
            <div class="table-container">
    <div class="metadata-group-control" id="metadataGroupControl" title="Collapse or expand metadata columns">
        <button type="button" class="metadata-group-pill" id="metadataGroupPill" onclick="toggleMetadata(); event.stopPropagation();" aria-label="Hide metadata columns" aria-expanded="true">
            <span class="metadata-group-symbol" id="metadataGroupSymbol">-</span>
            <span id="metadataToggleText" class="metadata-group-text">Collapse</span>
        </button>
        <button type="button" class="favorites-quick-btn" id="favoritesToggle" onclick="toggleFavoritesFilter(); event.stopPropagation();" aria-pressed="false" title="Show starred projects only">&#9733; Favorites</button>
    </div>
    <div class="table-scroll">
        <table id="projectTable">
                <thead><tr id="tableHeader"></tr></thead>
                <tbody id="tableBody"></tbody>
           </table>
        </div>
    </div>
            <aside class="details-panel" id="detailsPanel" aria-live="polite">
                <div class="details-panel-header">
                    <h3>Project Details</h3>
                    <span class="details-panel-subtitle" id="detailsPanelSubtitle">Select a row</span>
                </div>
                <div class="details-panel-body" id="detailsPanelBody">
                    <p class="details-empty">Turn on the details panel and select a project row.</p>
                </div>
            </aside>
        </div>
    </div>
    <div class="toast" id="toast"></div>
        <div class="color-palette" id="colorPalette">
        <div class="color-grid" id="colorGrid"></div>
    </div>
    <input type="file" id="fileInput" accept=".json" style="display: none;" />
<input type="file" id="excelFileInput" accept=".xlsx,.xls,.csv" style="display: none;" />
    <script>
let projects = [], customColumns = [], columnOrder = [], columnWidths = {}, columnFilters = {}, sortColumn = null, sortDirection = 'asc', metadataCollapsed = false, draggedColumn = null, resizingColumn = null, startX = 0, startWidth = 0, isResizing = false, isNavigating = false;
let detailsPanelEnabled = false;
let fillStartCell = null;
let fillEndCell = null;
        let isFilling = false;     
 let selectedCell = null;
let selectedProjectKey = null;
        let editingElement = null;
        let projectSearchTerm = '';
        let pendingProjectSearchTerm = '';
        let projectSearchDebounceTimer = null;
        let favoritesFilterEnabled = false;
        let pendingIssuanceModal = null;
        let defaultStatusColumns = ['Engagement Letter', 'Kickoff Call', 'Suralink', 'Engagement Manager', 'ETD', 'Planning', 'Confirms', 'Audit Evidence', 'Financials', 'Representation Letter', 'Letter to TCWG', 'Issued', 'Archived'];
        let draggedRow = null;
        let activeColorProjectId = null;
        let activeFilterColumn = null;
        let tempFilterSelections = {};
        const COLORS = ['#ffffff', '#fecaca', '#fed7aa', '#fde047', '#a7f3d0', '#7dd3fc', '#c4b5fd', '#f9a8d4', '#ef4444', '#f97316', '#eab308', '#22c55e', '#3b82f6', '#a855f7', '#ec4899'];

        const metadataColumns = [
            { key: 'rowColor', label: '&#9679;', type: 'color', group: 'metadata', frozen: true },
{ key: 'clientName', label: 'Client Name', type: 'text', group: 'metadata', frozen: true },
{ key: 'clientId', label: 'Client ID', type: 'text', group: 'metadata' },
            { key: 'hardDueDate', label: 'Hard Due Date', type: 'date', group: 'metadata' },
            { key: 'softDueDate', label: 'Soft Due Date', type: 'date', group: 'metadata' },
            { key: 'issuanceDate', label: 'Issuance Date', type: 'date', group: 'metadata' },
            { key: 'archiveDeadline', label: 'Archive Deadline', type: 'date', calculated: true, group: 'metadata' },
            { key: 'auditType', label: 'Audit Type', type: 'text', group: 'metadata' },
            { key: 'quarter', label: 'Quarter', type: 'text', group: 'metadata' },
            { key: 'team', label: 'Team', type: 'text', group: 'metadata' }
        ];
const statusOptions = ['Not Started', 'Started', 'Pending Client', 'Pending Senior', 'Pending Supervisor', 'Pending Manager', 'Pending Director', 'Pending Partner', 'Pending My Review', 'Needs Attention', 'Complete', 'N/A'];
        

        function getAllColumns() {
            return [...metadataColumns, ...defaultStatusColumns.map(col => ({ key: col.toLowerCase().replace(/\s+/g, ''), label: col, type: 'status', group: 'status' })), ...customColumns.map(col => ({ ...col, type: 'status', group: 'custom' }))];
        }

        function setProjectSearch(value) {
            projectSearchTerm = String(value || '').trim().toLowerCase();
            localStorage.setItem('projectTrackerSearchTerm', projectSearchTerm);
            renderProjects();
        }

        function queueProjectSearch(value) {
            pendingProjectSearchTerm = String(value || '');
            if (projectSearchDebounceTimer) clearTimeout(projectSearchDebounceTimer);
            projectSearchDebounceTimer = setTimeout(() => {
                setProjectSearch(pendingProjectSearchTerm);
                projectSearchDebounceTimer = null;
            }, 600);
        }

        function flushProjectSearch() {
            if (projectSearchDebounceTimer) {
                clearTimeout(projectSearchDebounceTimer);
                projectSearchDebounceTimer = null;
            }
            const input = document.getElementById('projectSearchInput');
            setProjectSearch(input ? input.value : pendingProjectSearchTerm);
        }

        function projectMatchesSearch(project, term) {
            if (!term) return true;
            const columns = getAllColumns();
            for (let i = 0; i < columns.length; i += 1) {
                const key = columns[i].key;
                const value = project[key];
                if (value === null || value === undefined) continue;
                if (String(value).toLowerCase().includes(term)) return true;
            }
            return false;
        }

       function loadData() {
    const saved = localStorage.getItem('projectTracker');
    const savedSearch = localStorage.getItem('projectTrackerSearchTerm');
    const savedFavoritesFilter = localStorage.getItem('projectTrackerFavoritesOnly');
    projectSearchTerm = savedSearch ? savedSearch : '';
    favoritesFilterEnabled = savedFavoritesFilter === 'true';
    if (saved) {
        const data = JSON.parse(saved);
        projects = data.projects || [];
        customColumns = data.customColumns || [];
        columnOrder = data.columnOrder || [];
        columnWidths = data.columnWidths || {};
        metadataCollapsed = data.metadataCollapsed || false;
        detailsPanelEnabled = !!data.detailsPanelEnabled;
        masterTeamList = data.masterTeamList || [];
        if (data.defaultStatusColumns) {
            defaultStatusColumns = data.defaultStatusColumns;
        }
    }
    if (columnOrder.length === 0) columnOrder = getAllColumns().map(col => col.key);
    
    // Force add rowColor to columnOrder if missing
    if (!columnOrder.includes('rowColor')) {
        columnOrder.unshift('rowColor');
        saveData();
    }

    const searchInput = document.getElementById('projectSearchInput');
    if (searchInput) searchInput.value = projectSearchTerm;
    syncFavoritesToggle();
    
    renderProjects();
    applyDetailsPanelState();
}

        function saveData() {
            localStorage.setItem('projectTracker', JSON.stringify({ 
                projects, 
                customColumns, 
                columnOrder, 
                columnWidths, 
                metadataCollapsed,
                detailsPanelEnabled,
                masterTeamList,
                defaultStatusColumns 
            }));
            showSaveIndicator();
        }

        function showSaveIndicator() {
            const indicator = document.getElementById('saveIndicator');
            indicator.classList.add('show');
            setTimeout(() => indicator.classList.remove('show'), 1500);
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function getSelectedProject() {
            const key = selectedProjectKey || (selectedCell ? selectedCell.closest('tr[data-project-id]')?.dataset.projectId : null);
            if (!key) return null;
            let match = projects.find(p => String(p.id) === String(key));
            if (match) return match;
            const parsed = Number(key);
            if (!Number.isNaN(parsed)) {
                match = projects.find(p => Number(p.id) === parsed);
                if (match) return match;
            }
            return null;
        }

        function getDaysUntil(dateString) {
            if (!dateString) return null;
            const parts = String(dateString).split('-');
            if (parts.length !== 3) return null;
            const year = parseInt(parts[0], 10);
            const month = parseInt(parts[1], 10);
            const day = parseInt(parts[2], 10);
            if (!year || !month || !day) return null;
            const target = new Date(year, month - 1, day);
            target.setHours(0, 0, 0, 0);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            return Math.ceil((target.getTime() - today.getTime()) / (1000 * 60 * 60 * 24));
        }

        function buildDetailsField(label, value) {
            const safeValue = value ? escapeHtml(value) : '-';
            return `<div class="details-item"><div class="details-label">${escapeHtml(label)}</div><div class="details-value">${safeValue}</div></div>`;
        }

        function updateSelectedProjectDetails() {
            const body = document.getElementById('detailsPanelBody');
            const subtitle = document.getElementById('detailsPanelSubtitle');
            if (!body || !subtitle) return;

            if (!detailsPanelEnabled) {
                subtitle.textContent = 'Panel Off';
                body.innerHTML = '<p class="details-empty">Details panel is off. Use "Show Details Panel" to enable it.</p>';
                return;
            }

            const project = getSelectedProject();
            if (!project) {
                subtitle.textContent = 'Select a row';
                body.innerHTML = '<p class="details-empty">Select any project row to view quick details here.</p>';
                return;
            }

            const hardDue = project.hardDueDate ? formatDate(project.hardDueDate) : '';
            const softDue = project.softDueDate ? formatDate(project.softDueDate) : '';
            const issueDate = project.issuanceDate ? formatDate(project.issuanceDate) : '';
            const archiveDate = project.archiveDeadline ? formatDate(project.archiveDeadline) : '';
            const allColumns = getAllColumns();
            const statusCols = allColumns.filter(col => col.group === 'status' || col.group === 'custom');
            const completeCount = statusCols.filter(col => (project[col.key] || 'Not Started') === 'Complete').length;
            const needsAttentionCount = statusCols.filter(col => (project[col.key] || '') === 'Needs Attention').length;
            const pendingCount = statusCols.filter(col => String(project[col.key] || '').toLowerCase().startsWith('pending')).length;
            const completionPct = statusCols.length ? Math.round((completeCount / statusCols.length) * 100) : 0;
            const activeCols = statusCols.filter(col => {
                const value = String(project[col.key] || '');
                return value !== 'Complete' && value !== 'N/A';
            });
            const allWorkflowDone = statusCols.length > 0 && activeCols.length === 0;
            const archivedDone = String(project.archived || '').toLowerCase() === 'complete';
            const daysToHardDue = getDaysUntil(project.hardDueDate);
            const nextStepCol = statusCols.find(col => {
                const value = (project[col.key] || 'Not Started');
                return value !== 'Complete' && value !== 'N/A';
            });
            const blockedCols = statusCols
                .filter(col => {
                    const value = String(project[col.key] || '');
                    return value === 'Needs Attention' || value.toLowerCase().startsWith('pending');
                })
                .slice(0, 2)
                .map(col => col.label);

            let healthLabel = 'On Track';
            let healthClass = 'on-track';
            let healthReason = '';
            const riskReasons = [];
            const watchReasons = [];
            if (typeof daysToHardDue === 'number' && daysToHardDue < 0) {
                riskReasons.push(`${Math.abs(daysToHardDue)} day(s) overdue`);
            }
            if (needsAttentionCount > 0) {
                riskReasons.push(`${needsAttentionCount} item(s) marked Needs Attention`);
            }
            if (typeof daysToHardDue === 'number' && daysToHardDue >= 0 && daysToHardDue <= 7) {
                watchReasons.push(`Hard due date in ${daysToHardDue} day(s)`);
            }
            if (pendingCount >= 3) {
                watchReasons.push(`${pendingCount} item(s) in pending status`);
            }
            if (completionPct < 45) {
                watchReasons.push(`Low completion progress (${completionPct}%)`);
            }
            if (archivedDone || allWorkflowDone) {
                healthLabel = 'Completed';
                healthClass = 'completed';
                healthReason = 'Workflow is complete and closed out';
            } else if ((typeof daysToHardDue === 'number' && daysToHardDue < 0) || needsAttentionCount > 0) {
                healthLabel = 'At Risk';
                healthClass = 'at-risk';
                healthReason = riskReasons.length ? riskReasons.join(' | ') : 'Risk indicators detected';
            } else if ((typeof daysToHardDue === 'number' && daysToHardDue <= 7) || pendingCount >= 3 || completionPct < 45) {
                healthLabel = 'Watch';
                healthClass = 'watch';
                healthReason = watchReasons.length ? watchReasons.join(' | ') : 'Watch indicators detected';
            } else {
                healthReason = 'No current risk indicators';
            }

            let dueSignal = 'No hard due date';
            if (archivedDone || allWorkflowDone) {
                dueSignal = 'Closed out';
            } else if (typeof daysToHardDue === 'number') {
                if (daysToHardDue < 0) dueSignal = `${Math.abs(daysToHardDue)} day(s) overdue`;
                else if (daysToHardDue === 0) dueSignal = 'Due today';
                else dueSignal = `${daysToHardDue} day(s) remaining`;
            }

            const nextStep = (archivedDone || allWorkflowDone) ? 'No action required' : (nextStepCol ? nextStepCol.label : 'All workflow steps complete');
            const blockerRecap = (archivedDone || allWorkflowDone) ? 'No blockers' : (blockedCols.length ? blockedCols.join(' | ') : 'No current blockers');

            subtitle.textContent = project.clientName ? project.clientName : 'Project';
            body.innerHTML =
                `<div class="details-recap">` +
                `<div class="details-recap-top">` +
                `<div class="details-ring" style="--progress:${completionPct};"><span>${completionPct}%</span></div>` +
                `<div class="details-headline"><div class="details-headline-title">${escapeHtml(project.clientName || 'Project')}</div>` +
                `<div class="details-headline-sub">Next Step: ${escapeHtml(nextStep)}</div></div>` +
                `<span class="details-health-pill ${healthClass}" title="${escapeHtml(healthReason)}">${healthLabel}</span>` +
                `</div>` +
                `<div class="details-kpis">` +
                `<div class="details-kpi"><div class="details-kpi-label">Due Signal</div><div class="details-kpi-value">${escapeHtml(dueSignal)}</div></div>` +
                `<div class="details-kpi"><div class="details-kpi-label">Pending</div><div class="details-kpi-value">${pendingCount}</div></div>` +
                `<div class="details-kpi"><div class="details-kpi-label">Attention</div><div class="details-kpi-value">${needsAttentionCount}</div></div>` +
                `</div>` +
                `<div class="details-callout"><strong>Recap:</strong> ${escapeHtml(blockerRecap)}</div>` +
                `</div>` +
                `<div class="details-grid">` +
                buildDetailsField('Client Name', project.clientName || '') +
                buildDetailsField('Client ID', project.clientId || '') +
                buildDetailsField('Team', project.team || '') +
                buildDetailsField('Hard Due Date', hardDue) +
                buildDetailsField('Soft Due Date', softDue) +
                buildDetailsField('Issuance Date', issueDate) +
                buildDetailsField('Archive Deadline', archiveDate) +
                buildDetailsField('Audit Type', project.auditType || '') +
                buildDetailsField('Quarter', project.quarter || '') +
                `</div>` +
                `<div class="details-meta"><div><strong>Status Progress:</strong> ${completeCount}/${statusCols.length} complete (${completionPct}%)</div>` +
                `<div><strong>Needs Attention:</strong> ${needsAttentionCount} | <strong>Pending:</strong> ${pendingCount}</div></div>`;
        }

        function applyDetailsPanelState() {
            const layout = document.getElementById('trackerLayout');
            const toggleText = document.getElementById('detailsPanelToggleText');
            if (layout) layout.classList.toggle('details-enabled', detailsPanelEnabled);
            if (toggleText) toggleText.textContent = detailsPanelEnabled ? '- Hide Details Panel' : '+ Show Details Panel';
            updateSelectedProjectDetails();
        }

        function toggleDetailsPanel() {
            detailsPanelEnabled = !detailsPanelEnabled;
            applyDetailsPanelState();
            saveData();
        }

        function addProject() {
            const newProject = { id: Date.now(), rowColor: '#ffffff', isStarred: false };
            metadataColumns.forEach(col => newProject[col.key] = '');
            defaultStatusColumns.forEach(col => newProject[col.toLowerCase().replace(/\s+/g, '')] = 'Not Started');
            customColumns.forEach(col => newProject[col.key] = 'Not Started');
            projects.push(newProject);
            renderProjects();
            saveData();
            showToast('Project added!');
        }

        function toggleProjectStar(id) {
            const project = projects.find(p => String(p.id) === String(id));
            if (!project) return;
            project.isStarred = !project.isStarred;
            renderProjects({ preserveScroll: true, suppressScroll: true });
            saveData();
        }

        function setFavoritesFilterEnabled(enabled) {
            favoritesFilterEnabled = !!enabled;
            localStorage.setItem('projectTrackerFavoritesOnly', favoritesFilterEnabled ? 'true' : 'false');
            syncFavoritesToggle();
            renderProjects();
        }

        function toggleFavoritesFilter() {
            const next = !favoritesFilterEnabled;
            if (next) {
                projectSearchTerm = '';
                localStorage.setItem('projectTrackerSearchTerm', '');
                columnFilters = {};
                const input = document.getElementById('projectSearchInput');
                if (input) input.value = '';
            }
            setFavoritesFilterEnabled(next);
        }

        function syncFavoritesToggle() {
            const btn = document.getElementById('favoritesToggle');
            if (!btn) return;
            btn.classList.toggle('active', favoritesFilterEnabled);
            btn.setAttribute('aria-pressed', favoritesFilterEnabled ? 'true' : 'false');
            btn.title = favoritesFilterEnabled ? 'Showing starred projects only' : 'Show starred projects only';
        }

        function deleteProject(id) {
            if (confirm('Delete this project?')) {
                projects = projects.filter(p => p.id !== id);
                renderProjects();
                saveData();
                showToast('Deleted!');
            }
        }

function updateProject(id, field, value, renderOptions) {
    const project = projects.find(p => String(p.id) === String(id));
    if (project) {
        project[field] = value;
        if (field === 'issuanceDate') {
            if (value) {
                const date = new Date(value);
                date.setDate(date.getDate() + 60);
                project.archiveDeadline = date.toISOString().split('T')[0];
            } else {
                project.archiveDeadline = '';
            }
        }
        const isOptions = renderOptions && typeof renderOptions === 'object';
        const skipRender = isOptions ? !!renderOptions.skipRender : !!renderOptions;
        if (!skipRender) {
            renderProjects({
                preserveScroll: !!(isOptions && renderOptions.preserveScroll),
                suppressScroll: !!(isOptions && renderOptions.suppressScroll)
            });
        }
        saveData();
    }
}

function openIssuanceDateModal(projectId, field, prevStatus) {
    const modal = document.getElementById('issuanceDateModal');
    const input = document.getElementById('issuanceDateInput');
    if (!modal || !input) return;

    const project = projects.find(p => String(p.id) === String(projectId));
    const today = new Date().toISOString().split('T')[0];
    input.value = project && project.issuanceDate ? project.issuanceDate : today;

    pendingIssuanceModal = { projectId, field, prevStatus };
    modal.classList.add('show');

function ensureSnowfall() {
    const container = document.getElementById('snowfall');
    if (!container || container.childElementCount > 0) return;
    const flakeCount = 80;
    for (let i = 0; i < flakeCount; i += 1) {
        const flake = document.createElement('div');
        flake.className = 'snowflake';
        const size = 2.6 + Math.random() * 4.6;
        const left = Math.random() * 100;
        const duration = 10 + Math.random() * 14;
        const delay = -Math.random() * duration;
        const opacity = 0.6 + Math.random() * 0.35;
        const drift = -24 + Math.random() * 48;
        flake.style.width = size + 'px';
        flake.style.height = size + 'px';
        flake.style.left = left + 'vw';
        flake.style.opacity = opacity.toFixed(2);
        flake.style.animationDuration = duration.toFixed(2) + 's';
        flake.style.animationDelay = delay.toFixed(2) + 's';
        flake.style.setProperty('--drift', drift.toFixed(1) + 'px');
        container.appendChild(flake);
    }
}

function updateSnowfallVisibility() {
    if (!document.body.classList.contains('theme-winter')) return;
    ensureSnowfall();
}

function getVisibleTrackerModalElements() {
    const candidates = document.querySelectorAll('.modal');
    const visible = [];
    for (let i = 0; i < candidates.length; i += 1) {
        const el = candidates[i];
        const style = window.getComputedStyle(el);
        if (!style || style.display === 'none' || style.visibility === 'hidden' || Number(style.opacity) === 0) continue;
        const rect = el.getBoundingClientRect();
        if (rect.width > 0 && rect.height > 0) visible.push(el);
    }
    return visible;
}

function computeModalOpenState() {
    return getVisibleTrackerModalElements().length > 0;
}

let parentViewportInfo = {
    visibleTop: 0,
    viewportHeight: Math.max(320, Math.floor(window.innerHeight || 0))
};

function requestParentViewportInfo() {
    if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: 'requestViewport' }, '*');
    }
}

const syncModalViewportToParent = (function() {
    let rafId = 0;
    return function() {
        if (rafId) cancelAnimationFrame(rafId);
        rafId = requestAnimationFrame(function() {
            rafId = 0;
            const openModals = getVisibleTrackerModalElements();
            if (!openModals.length) return;
            const parentH = Math.max(320, Math.floor(parentViewportInfo.viewportHeight || window.innerHeight || 0));
            let visibleTop = Math.max(0, Math.floor(parentViewportInfo.visibleTop || 0));
            const docH = Math.max(
                document.documentElement ? document.documentElement.scrollHeight : 0,
                document.body ? document.body.scrollHeight : 0
            );
            if (docH > 0 && visibleTop + parentH > docH) visibleTop = Math.max(0, docH - parentH);
            for (let i = 0; i < openModals.length; i += 1) {
                const modal = openModals[i];
                modal.style.position = 'absolute';
                modal.style.left = '0';
                modal.style.right = '0';
                modal.style.width = '100%';
                modal.style.top = visibleTop + 'px';
                modal.style.height = parentH + 'px';
                modal.style.alignItems = 'center';

            const delta = Number(event.deltaY || 0);

function clampStatsPanelOffset(modal, panel, offset) {
            const viewportH = Math.max(320, modal && modal.clientHeight ? modal.clientHeight : (window.innerHeight || 0));
            const panelH = Math.max(240, panel && panel.scrollHeight ? panel.scrollHeight : 0);
            const baseTop = (viewportH - panelH) / 2;
            let minOffset = 12 - baseTop;
            let maxOffset = (viewportH - 12 - panelH) - baseTop;
            if (minOffset > maxOffset) {
                const swap = minOffset;
                minOffset = maxOffset;
                maxOffset = swap;
            }
            return Math.max(minOffset, Math.min(maxOffset, Number(offset) || 0));

function calculateStats() {
            const container = document.getElementById('statsContent');

                const m = parseInt(parts[1], 10);

            };
            
            // Total projects
            const totalProjects = projects.length;
            
            // Status breakdown
            const statusColumns = [...defaultStatusColumns.map(col => col.toLowerCase().replace(/\s+/g, '')), ...customColumns.map(c => c.key)];
            
            // Count projects not started and in progress
            let notStartedProjects = 0;
            let inProgressProjects = 0;
            let completedCount = 0;
            let totalTasks = 0;
            const totalProjectList = [];
            const notStartedList = [];
            const inProgressList = [];
            
            projects.forEach(project => {
                totalProjectList.push(project.clientName || 'Unnamed Project');
                let projectNotStarted = true;
                let projectInProgress = false;

                if (statusColumns.length === 0) {
                    projectNotStarted = false;
                    projectInProgress = false;
                }
                
                statusColumns.forEach(col => {
                    totalTasks++;
                    const status = project[col];
                    if (status === 'Complete') {
                        completedCount++;
                        projectNotStarted = false;
                    } else if (status && status !== 'Not Started') {
                        projectInProgress = true;
                        projectNotStarted = false;
                    }
                });
                
                if (projectNotStarted) {
                    notStartedProjects++;
                    notStartedList.push(project.clientName || 'Unnamed Project');
                } else if (projectInProgress) {
                    inProgressProjects++;
                    inProgressList.push(project.clientName || 'Unnamed Project');
                }
            });
            
            const completionRate = totalTasks > 0 ? Math.round((completedCount / totalTasks) * 100) : 0;
            
            // Count completed projects
            let completedProjects = 0;

            projects.forEach(project => {
                if (statusColumns.length === 0) return;
                let allComplete = true;

                    const status = project[col] || 'Not Started';
                    if (status !== 'Complete' && status !== 'N/A') {

                if (allComplete) {

            // Deadlines

            const dayOfWeek = today.getDay();
            const weekStart = new Date(today);
            weekStart.setDate(today.getDate() - dayOfWeek);
            weekStart.setHours(0, 0, 0, 0);
            
            const weekEnd = new Date(weekStart);
            weekEnd.setDate(weekStart.getDate() + 6);
            weekEnd.setHours(23, 59, 59, 999);
            
            let dueThisWeek = [];
            let dueThisMonth = [];
            let overdueProjects = [];
            const dueProjectsByDate = {};
            
            const issuedKey = 'issued';
            
            projects.forEach(project => {
                const isIssued = project[issuedKey] === 'Complete';
                
                if (project.hardDueDate && !isIssued) {
                    const dueDate = parseLocalDateOnly(project.hardDueDate);
                    if (!dueDate) return;
                    const diffTime = dueDate - today;
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                    
                    const dueMonth = dueDate.getMonth();
                    const dueYear = dueDate.getFullYear();
                    
                    if (diffDays < 0) {
                        overdueProjects.push({
                            name: project.clientName || 'Unnamed Project',
                            date: project.hardDueDate,
                            daysOverdue: Math.abs(diffDays)
                        });
                    } else if (dueDate >= weekStart && dueDate <= weekEnd) {
                        dueThisWeek.push({
                            name: project.clientName || 'Unnamed Project',
                            date: project.hardDueDate
                        });
                    }
                    
                    // Check if due this month (includes this week)
                    if (dueMonth === currentMonth && dueYear === currentYear && diffDays >= 0) {
                        dueThisMonth.push({
                            name: project.clientName || 'Unnamed Project',
                            date: project.hardDueDate
                        });
                    }

                    const dueKey = project.hardDueDate;
                    if (dueKey) {

                const day = String(d.getDate()).padStart(2, '0');

            projects.forEach(project => {

                if (!dueDate) return;

                dueCountByDate[key] = (dueCountByDate[key] || 0) + 1;
            });
            const heatStart = new Date(today);
            heatStart.setDate(today.getDate() - today.getDay()); // Sunday start
            const heatCells = [];
            for (let i = 0; i < 42; i += 1) {
                const d = new Date(heatStart);

                const count = dueCountByDate[key] || 0;

                const isCurrentMonth = d.getMonth() === today.getMonth();

            html += buildStatList('Projects Not Started', notStartedProjects, 'statListNotStarted', notStartedList, '#64748b');

                <h2>&#128202; Project Statistics</h2>
                <button class="close-button" onclick="toggleStats()">&times;</button>
            </div>
            <div id="statsContent"></div>
        </div>
    </div>
    <div class="modal" id="issuanceDateModal" onclick="if(event.target === this) closeIssuanceDateModal(true)">
        <div class="modal-content" style="max-width: 420px;">
            <div class="modal-header">
                <h2>Issuance Date</h2>
                <button class="close-button" onclick="closeIssuanceDateModal(true)">&times;</button>
            </div>
            <div style="display: grid; gap: 1rem;">
                <label for="issuanceDateInput" style="font-weight: 600;">Select issuance date</label>
                <input id="issuanceDateInput" type="date" style="padding: 0.5rem 0.75rem; border: 1px solid #cbd5e1; border-radius: 8px;" />
                <div style="display: flex; justify-content: flex-end; gap: 0.5rem;">
                    <button class="btn" onclick="closeIssuanceDateModal(true)">Cancel</button>
                    <button class="btn btn-success" onclick="confirmIssuanceDate()">Save</button>
                </div>
            </div>
        </div>
    </div>
    <div class="footer">Built by JER | 2026</div>
    <div id="snowfall" aria-hidden="true"></div>
</body>
</html>
