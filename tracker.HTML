<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engagement Flow • Audit Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
    <style>
        .kanban-column { min-height: 600px; }
        .client-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .client-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1); }
        .progress-bar { transition: width 0.4s ease-in-out; }
    </style>
</head>
<body class="h-full bg-zinc-950 text-white">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <div class="w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col">
            <div class="p-6 border-b border-zinc-800">
                <h1 class="text-2xl font-bold flex items-center gap-3">
                    <i class="fa-solid fa-chart-gantt text-emerald-500"></i>
                    Engagement Flow
                </h1>
                <p class="text-zinc-500 text-sm mt-1">Audit Practice OS</p>
            </div>
            
            <div class="p-4">
                <button onclick="addNewClient()" 
                        class="w-full bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl font-medium flex items-center justify-center gap-2">
                    <i class="fa-solid fa-plus"></i>
                    Add New Client
                </button>
            </div>

            <div class="px-4">
                <div class="text-xs uppercase tracking-widest text-zinc-500 mb-2 px-3">Quick Filters</div>
                <div onclick="filterBy('all')" class="px-3 py-2 hover:bg-zinc-800 rounded-lg cursor-pointer flex items-center gap-2 text-sm" id="filter-all">
                    <i class="fa-solid fa-list"></i> All Clients
                </div>
                <div onclick="filterBy('overdue')" class="px-3 py-2 hover:bg-zinc-800 rounded-lg cursor-pointer flex items-center gap-2 text-sm" id="filter-overdue">
                    <i class="fa-solid fa-clock text-red-400"></i> Overdue
                </div>
            </div>

            <div class="mt-auto p-4 border-t border-zinc-800">
                <button onclick="exportData()" 
                        class="w-full text-zinc-400 hover:text-white text-sm py-2 flex items-center gap-2 justify-center">
                    <i class="fa-solid fa-download"></i> Export JSON
                </button>
                <button onclick="importData()" 
                        class="w-full text-zinc-400 hover:text-white text-sm py-2 flex items-center gap-2 justify-center">
                    <i class="fa-solid fa-upload"></i> Import JSON
                </button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col">
            <!-- Top Bar -->
            <div class="h-16 border-b border-zinc-800 bg-zinc-900 px-8 flex items-center justify-between">
                <div class="flex items-center gap-8">
                    <input id="searchInput" 
                           onkeyup="filterClients()"
                           type="text" 
                           placeholder="Search clients..." 
                           class="bg-zinc-800 border border-zinc-700 rounded-xl px-5 py-2 w-80 focus:outline-none focus:border-emerald-500">
                    
                    <div class="flex items-center gap-2 text-sm">
                        <button onclick="switchView('kanban')" id="btn-kanban"
                                class="px-4 py-2 rounded-xl hover:bg-zinc-800 data-[active=true]:bg-zinc-800">Kanban</button>
                        <button onclick="switchView('resource')" id="btn-resource"
                                class="px-4 py-2 rounded-xl hover:bg-zinc-800">Resource View</button>
                    </div>
                </div>

                <div class="flex items-center gap-4">
                    <button onclick="showMondayModal()" 
                            class="bg-white text-black px-5 py-2 rounded-2xl font-medium flex items-center gap-2 hover:bg-emerald-400">
                        <i class="fa-solid fa-calendar"></i>
                        Monday Overview
                    </button>
                    <div class="w-8 h-8 bg-emerald-600 rounded-full flex items-center justify-center font-semibold">GG</div>
                </div>
            </div>

            <!-- Kanban View -->
            <div id="kanbanView" class="flex-1 overflow-auto p-8">
                <div class="grid grid-cols-5 gap-6" id="kanbanBoard">
                    <!-- Columns will be injected by JS -->
                </div>
            </div>

            <!-- Resource View (hidden by default) -->
            <div id="resourceView" class="flex-1 overflow-auto p-8 hidden">
                <h2 class="text-xl font-semibold mb-6">Team Bandwidth</h2>
                <div class="grid grid-cols-3 gap-6" id="resourceGrid">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>

        <!-- Right Sidebar: Bottlenecks -->
        <div class="w-80 bg-zinc-900 border-l border-zinc-800 p-6 overflow-auto">
            <h3 class="font-semibold mb-4 flex items-center gap-2">
                <i class="fa-solid fa-triangle-exclamation text-amber-400"></i>
                Active Bottlenecks
            </h3>
            <div id="bottleneckList" class="space-y-3">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <!-- Add/Edit Client Modal -->
    <div id="clientModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-zinc-900 rounded-3xl w-full max-w-lg mx-4">
            <div class="p-8">
                <h2 class="text-2xl font-bold mb-6" id="modalTitle">Add New Client</h2>
                
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm text-zinc-400 mb-1">Client Name</label>
                        <input id="clientName" type="text" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-3 focus:outline-none focus:border-emerald-500">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm text-zinc-400 mb-1">Client Code</label>
                            <input id="clientCode" type="text" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-3 focus:outline-none focus:border-emerald-500">
                        </div>
                        <div>
                            <label class="block text-sm text-zinc-400 mb-1">Assigned To</label>
                            <select id="assignedTo" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-3 focus:outline-none focus:border-emerald-500">
                                <option value="Gon">Gon</option>
                                <option value="Sarah">Sarah</option>
                                <option value="Mike">Mike</option>
                                <option value="Priya">Priya</option>
                            </select>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm text-zinc-400 mb-1">Start Date</label>
                            <input id="startDate" type="date" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-3 focus:outline-none focus:border-emerald-500">
                        </div>
                        <div>
                            <label class="block text-sm text-zinc-400 mb-1">Due Date</label>
                            <input id="dueDate" type="date" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-3 focus:outline-none focus:border-emerald-500">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm text-zinc-400 mb-1">Stage</label>
                        <select id="stageSelect" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-3 focus:outline-none focus:border-emerald-500">
                            <option value="Planning">Planning</option>
                            <option value="Fieldwork">Fieldwork</option>
                            <option value="Reporting">Reporting</option>
                            <option value="Final">Final</option>
                            <option value="Archive">Archive</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <div class="border-t border-zinc-800 p-6 flex gap-3">
                <button onclick="closeModal()" 
                        class="flex-1 py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl font-medium">Cancel</button>
                <button onclick="saveClient()" 
                        class="flex-1 py-4 bg-emerald-600 hover:bg-emerald-500 rounded-2xl font-medium">Save Client</button>
            </div>
        </div>
    </div>

    <!-- Monday Overview Modal -->
    <div id="mondayModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-zinc-900 rounded-3xl w-full max-w-md mx-4 p-8">
            <h2 class="text-2xl font-bold mb-6">Monday Overview</h2>
            <div id="mondayContent" class="space-y-6">
                <!-- JS injected -->
            </div>
            <button onclick="closeMondayModal()" 
                    class="mt-8 w-full py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl">Close</button>
        </div>
    </div>

    <script>
        // Sample Data
        let clients = [
            {
                id: "c1",
                name: "Acme Manufacturing",
                clientCode: "ACM-2026",
                stage: "Fieldwork",
                progress: 65,
                startDate: "2026-03-01",
                dueDate: "2026-05-15",
                assignedTo: "Gon",
                milestones: [
                    {title: "Engagement letter signed", completed: true},
                    {title: "Risk assessment complete", completed: true},
                    {title: "Internal controls tested", completed: false},
                    {title: "Substantive testing", completed: false}
                ],
                bottlenecks: ["Waiting on bank confirmations"]
            },
            {
                id: "c2",
                name: "TechNova Inc",
                clientCode: "TNV-2026",
                stage: "Planning",
                progress: 30,
                startDate: "2026-04-01",
                dueDate: "2026-06-01",
                assignedTo: "Sarah",
                milestones: [
                    {title: "Kickoff meeting", completed: true},
                    {title: "Planning analytics", completed: false}
                ],
                bottlenecks: []
            },
            {
                id: "c3",
                name: "Green Valley Foods",
                clientCode: "GVF-2026",
                stage: "Reporting",
                progress: 80,
                startDate: "2026-02-15",
                dueDate: "2026-04-30",
                assignedTo: "Mike",
                milestones: [
                    {title: "Draft report", completed: true},
                    {title: "Management letter", completed: false}
                ],
                bottlenecks: ["Client missing AR aging"]
            }
        ];

        const stages = ["Planning", "Fieldwork", "Reporting", "Final", "Archive"];

        function saveToLocalStorage() {
            localStorage.setItem("engagementClients", JSON.stringify(clients));
        }

        function loadFromLocalStorage() {
            const saved = localStorage.getItem("engagementClients");
            if (saved) clients = JSON.parse(saved);
        }

        function calculateProgress(milestones) {
            if (!milestones || milestones.length === 0) return 0;
            const completed = milestones.filter(m => m.completed).length;
            return Math.round((completed / milestones.length) * 100);
        }

        function renderKanban() {
            const board = document.getElementById("kanbanBoard");
            board.innerHTML = "";

            stages.forEach(stage => {
                const columnClients = clients.filter(c => c.stage === stage);
                
                const col = document.createElement("div");
                col.className = "bg-zinc-900 rounded-3xl p-4 border border-zinc-800";
                col.innerHTML = `
                    <div class="flex items-center justify-between mb-4 px-2">
                        <div class="font-semibold">${stage}</div>
                        <div class="text-xs bg-zinc-800 px-3 py-1 rounded-full">${columnClients.length}</div>
                    </div>
                    <div class="space-y-3 min-h-[500px] kanban-column" id="col-${stage}"></div>
                `;
                board.appendChild(col);

                const container = document.getElementById(`col-${stage}`);
                
                columnClients.forEach(client => {
                    const card = createClientCard(client);
                    container.appendChild(card);
                });

                // Make droppable
                container.addEventListener("dragover", e => e.preventDefault());
                container.addEventListener("drop", e => {
                    e.preventDefault();
                    const id = e.dataTransfer.getData("text/plain");
                    const client = clients.find(c => c.id === id);
                    if (client) {
                        client.stage = stage;
                        client.progress = calculateProgress(client.milestones);
                        renderKanban();
                        renderBottlenecks();
                        saveToLocalStorage();
                    }
                });
            });
        }

        function createClientCard(client) {
            const card = document.createElement("div");
            card.className = `client-card bg-zinc-800 border border-zinc-700 rounded-2xl p-4 cursor-grab active:cursor-grabbing`;
            card.draggable = true;
            card.ondragstart = (e) => {
                e.dataTransfer.setData("text/plain", client.id);
            };

            const isOverdue = new Date(client.dueDate) < new Date() && client.stage !== "Archive";

            card.innerHTML = `
                <div class="flex justify-between items-start">
                    <div>
                        <div class="font-semibold">${client.name}</div>
                        <div class="text-xs text-zinc-500">${client.clientCode}</div>
                    </div>
                    <div class="text-xs px-2.5 py-1 rounded-full bg-zinc-700">${client.assignedTo}</div>
                </div>
                
                <div class="mt-4 h-2 bg-zinc-700 rounded-full overflow-hidden">
                    <div class="progress-bar h-full ${client.progress > 70 ? 'bg-emerald-500' : client.progress > 40 ? 'bg-amber-500' : 'bg-red-500'}" 
                         style="width: ${client.progress}%"></div>
                </div>
                <div class="text-xs text-right mt-1 text-zinc-400">${client.progress}%</div>

                <div class="mt-3 text-xs">
                    <span class="${isOverdue ? 'text-red-400' : 'text-zinc-400'}">
                        Due: ${client.dueDate}
                    </span>
                </div>

                ${client.bottlenecks && client.bottlenecks.length > 0 ? `
                <div class="mt-3 flex flex-wrap gap-1">
                    ${client.bottlenecks.map(b => `<span class="text-[10px] bg-red-900/50 text-red-300 px-2 py-0.5 rounded">⚠ ${b}</span>`).join('')}
                </div>` : ''}
            `;

            card.onclick = () => editClient(client.id);
            return card;
        }

        function renderBottlenecks() {
            const container = document.getElementById("bottleneckList");
            container.innerHTML = "";

            const withBottlenecks = clients.filter(c => c.bottlenecks && c.bottlenecks.length > 0);

            if (withBottlenecks.length === 0) {
                container.innerHTML = `<p class="text-zinc-500 text-sm">No active bottlenecks</p>`;
                return;
            }

            withBottlenecks.forEach(client => {
                const div = document.createElement("div");
                div.className = "bg-zinc-800 border border-red-900/30 rounded-2xl p-4 text-sm";
                div.innerHTML = `
                    <div class="font-medium">${client.name}</div>
                    <div class="text-red-400 text-xs mt-1">${client.bottlenecks[0]}</div>
                `;
                container.appendChild(div);
            });
        }

        function renderResourceView() {
            const container = document.getElementById("resourceGrid");
            container.innerHTML = "";

            const team = {};
            clients.forEach(c => {
                if (!team[c.assignedTo]) team[c.assignedTo] = [];
                team[c.assignedTo].push(c);
            });

            Object.keys(team).forEach(member => {
                const memberClients = team[member];
                const totalProgress = memberClients.reduce((sum, c) => sum + c.progress, 0) / memberClients.length;

                const card = document.createElement("div");
                card.className = "bg-zinc-900 border border-zinc-700 rounded-3xl p-6";
                card.innerHTML = `
                    <div class="flex justify-between">
                        <div class="font-semibold">${member}</div>
                        <div class="text-sm ${memberClients.length > 5 ? 'text-red-400' : 'text-emerald-400'}">${memberClients.length} clients</div>
                    </div>
                    <div class="text-5xl font-bold mt-4">${Math.round(totalProgress)}%</div>
                    <div class="text-xs text-zinc-500">avg progress</div>
                `;
                container.appendChild(card);
            });
        }

        function addNewClient() {
            document.getElementById("modalTitle").textContent = "Add New Client";
            document.getElementById("clientName").value = "";
            document.getElementById("clientCode").value = "";
            document.getElementById("startDate").value = "";
            document.getElementById("dueDate").value = "";
            document.getElementById("stageSelect").value = "Planning";
            document.getElementById("assignedTo").value = "Gon";
            document.getElementById("clientModal").classList.remove("hidden");
            window.currentEditingId = null;
        }

        function editClient(id) {
            const client = clients.find(c => c.id === id);
            if (!client) return;

            document.getElementById("modalTitle").textContent = "Edit Client";
            document.getElementById("clientName").value = client.name;
            document.getElementById("clientCode").value = client.clientCode;
            document.getElementById("startDate").value = client.startDate;
            document.getElementById("dueDate").value = client.dueDate;
            document.getElementById("stageSelect").value = client.stage;
            document.getElementById("assignedTo").value = client.assignedTo;
            
            document.getElementById("clientModal").classList.remove("hidden");
            window.currentEditingId = id;
        }

        function saveClient() {
            const name = document.getElementById("clientName").value.trim();
            if (!name) return alert("Client name is required");

            if (window.currentEditingId) {
                const client = clients.find(c => c.id === window.currentEditingId);
                if (client) {
                    client.name = name;
                    client.clientCode = document.getElementById("clientCode").value;
                    client.startDate = document.getElementById("startDate").value;
                    client.dueDate = document.getElementById("dueDate").value;
                    client.stage = document.getElementById("stageSelect").value;
                    client.assignedTo = document.getElementById("assignedTo").value;
                    client.progress = calculateProgress(client.milestones);
                }
            } else {
                const newClient = {
                    id: "c" + Date.now().toString(36),
                    name: name,
                    clientCode: document.getElementById("clientCode").value || "NEW-" + Date.now().toString().slice(-4),
                    stage: document.getElementById("stageSelect").value,
                    progress: 0,
                    startDate: document.getElementById("startDate").value,
                    dueDate: document.getElementById("dueDate").value,
                    assignedTo: document.getElementById("assignedTo").value,
                    milestones: [
                        {title: "Engagement letter signed", completed: false},
                        {title: "Risk assessment", completed: false},
                        {title: "Fieldwork started", completed: false}
                    ],
                    bottlenecks: []
                };
                clients.push(newClient);
            }

            closeModal();
            renderKanban();
            renderBottlenecks();
            saveToLocalStorage();
        }

        function closeModal() {
            document.getElementById("clientModal").classList.add("hidden");
        }

        function showMondayModal() {
            const content = document.getElementById("mondayContent");
            content.innerHTML = `
                <div class="space-y-4">
                    <div class="bg-zinc-800 rounded-2xl p-5">
                        <div class="text-emerald-400 text-sm font-medium">This Week Priority</div>
                        <div class="mt-3 space-y-3">
                            ${clients.filter(c => c.stage === "Planning" || new Date(c.dueDate) < new Date(Date.now() + 7*86400000)).slice(0,3).map(c => `
                                <div class="flex justify-between text-sm">
                                    <span>${c.name}</span>
                                    <span class="text-zinc-400">${c.stage}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="text-center text-zinc-500 text-sm">You have ${clients.filter(c => new Date(c.dueDate) < new Date()).length} overdue items</div>
                </div>
            `;
            document.getElementById("mondayModal").classList.remove("hidden");
        }

        function closeMondayModal() {
            document.getElementById("mondayModal").classList.add("hidden");
        }

        function switchView(view) {
            document.getElementById("kanbanView").classList.toggle("hidden", view !== "kanban");
            document.getElementById("resourceView").classList.toggle("hidden", view !== "resource");
            
            document.getElementById("btn-kanban").dataset.active = view === "kanban";
            document.getElementById("btn-resource").dataset.active = view === "resource";

            if (view === "resource") renderResourceView();
        }

        function filterClients() {
            const term = document.getElementById("searchInput").value.toLowerCase();
            // Simple filter - re-render with all for demo (full filter would hide cards)
            renderKanban();
        }

        function filterBy(type) {
            // Placeholder - can be expanded
            renderKanban();
        }

        function exportData() {
            const dataStr = JSON.stringify(clients, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = "engagement-flow-backup.json";
            link.click();
        }

        function importData() {
            const input = document.createElement("input");
            input.type = "file";
            input.accept = ".json";
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = ev => {
                    try {
                        clients = JSON.parse(ev.target.result);
                        renderKanban();
                        renderBottlenecks();
                        saveToLocalStorage();
                        alert("Data imported successfully!");
                    } catch(e) {
                        alert("Invalid JSON file");
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        // Initialize
        window.onload = () => {
            loadFromLocalStorage();
            if (clients.length === 0) {
                // keep the sample data
            }
            renderKanban();
            renderBottlenecks();
            switchView('kanban');
        };
    </script>
</body>
</html>
